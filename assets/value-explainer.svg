<svg xmlns="http://www.w3.org/2000/svg" width="880" height="744" viewBox="0 0 880 744" role="img" aria-label="Why a warm cache costs ~10x less per turn, and how Cache Manager helps you capture that saving">
  <defs>
    <linearGradient id="drain" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7fd3ab"/>
      <stop offset="0.5" stop-color="#e8b94a"/>
      <stop offset="1" stop-color="#e08a84"/>
    </linearGradient>
    <filter id="ds" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1e2a3a" flood-opacity="0.14"/>
    </filter>
    <style>
      .hd   { font-family: 'Chalkboard SE','Comic Neue','Trebuchet MS','Segoe UI',sans-serif; font-weight: 700; }
      .sub  { font-family: 'Trebuchet MS','Segoe UI',sans-serif; }
      .tool { font-family: 'SFMono-Regular','Consolas','Liberation Mono',monospace; font-weight: 700; }
    </style>
  </defs>

  <!-- card -->
  <rect x="2" y="2" width="876" height="740" rx="22" fill="#ffffff" stroke="#dfe6ef" stroke-width="2"/>

  <!-- ============ HEADER ============ -->
  <text class="hd"  x="42" y="50" font-size="26" fill="#2f5a48">Keep the cache warm &#8212; pay ~10&#215; less per turn</text>
  <text class="sub" x="42" y="76" font-size="14" fill="#5f7468">Prompt caching does the saving. Cache Manager keeps the TTL window in view and resumes cheaply when the cache is gone.</text>
  <line x1="42" y1="90" x2="838" y2="90" stroke="#eceff3" stroke-width="2"/>

  <!-- ============ BAND 1: caching basics ============ -->
  <text class="hd" x="42" y="120" font-size="15.5" fill="#0f7a57">1 &#183; Every request reuses a big cached prefix</text>

  <!-- prefix box -->
  <g filter="url(#ds)">
    <rect x="42" y="138" width="470" height="48" rx="12" fill="#d9f5e8" stroke="#46c08e" stroke-width="2"/>
  </g>
  <text class="sub" x="277" y="160" text-anchor="middle" font-size="13" font-weight="700" fill="#2f6b54">CACHED PREFIX</text>
  <text class="sub" x="277" y="177" text-anchor="middle" font-size="11.5" fill="#4f8a72">system &#183; tool defs &#183; conversation so far</text>
  <!-- plus -->
  <text class="sub" x="524" y="169" text-anchor="middle" font-size="20" fill="#9aa8bc">+</text>
  <!-- new input box -->
  <g filter="url(#ds)">
    <rect x="540" y="138" width="92" height="48" rx="12" fill="#eef2f7" stroke="#b8c4d6" stroke-width="2"/>
  </g>
  <text class="sub" x="586" y="167" text-anchor="middle" font-size="12.5" fill="#4a5a72">new input</text>

  <!-- price lines -->
  <circle cx="50" cy="210" r="5" fill="#46c08e"/>
  <text class="sub" x="62" y="215" font-size="13.5" fill="#0f7a57"><tspan font-weight="700">warm</tspan> &#8212; prefix served from cache at the cache-read rate</text>
  <text class="tool" x="430" y="215" font-size="13.5" fill="#0f7a57">$0.50 / 1M</text>

  <circle cx="50" cy="236" r="5" fill="#e08a84"/>
  <text class="sub" x="62" y="241" font-size="13.5" fill="#c0453f"><tspan font-weight="700">cold</tspan> &#8212; same prefix re-sent and billed as full input</text>
  <text class="tool" x="430" y="241" font-size="13.5" fill="#c0453f">$5.00 / 1M</text>

  <!-- 10x badge -->
  <g filter="url(#ds)">
    <rect x="648" y="132" width="190" height="112" rx="16" fill="#fde3e1" stroke="#e8a39c" stroke-width="2"/>
  </g>
  <text class="hd"  x="743" y="196" text-anchor="middle" font-size="50" fill="#c0453f">10&#215;</text>
  <text class="sub" x="743" y="222" text-anchor="middle" font-size="12.5" fill="#a85852">cheaper, warm vs cold</text>

  <!-- ============ BAND 2: TTL window ============ -->
  <line x1="42" y1="262" x2="838" y2="262" stroke="#eceff3" stroke-width="2"/>
  <text class="hd" x="42" y="292" font-size="15.5" fill="#0c6470">2 &#183; The catch &#8212; that cache has a 5-minute TTL</text>

  <!-- segmented TTL bar -->
  <rect x="60"  y="308" width="298" height="32" rx="7" fill="#d9f5e8" stroke="#46c08e" stroke-width="2"/>
  <rect x="362" y="308" width="176" height="32" rx="7" fill="url(#drain)" stroke="#d9b06a" stroke-width="2"/>
  <rect x="542" y="308" width="278" height="32" rx="7" fill="#fde3e1" stroke="#e8a39c" stroke-width="2"/>

  <text class="sub" x="209" y="328" text-anchor="middle" font-size="11.5" fill="#2f6b54">turns within 5 min &#8594; TTL resets &#8594; cache HIT</text>
  <text class="sub" x="450" y="328" text-anchor="middle" font-size="11.5" fill="#8a5a1e">no activity&#8230; it drains</text>
  <text class="sub" x="681" y="328" text-anchor="middle" font-size="11.5" fill="#b8423b">TTL expired &#8594; COLD START (cache MISS)</text>

  <!-- time track -->
  <line x1="60" y1="364" x2="820" y2="364" stroke="#cdd6e2" stroke-width="2"/>
  <circle cx="95"  cy="364" r="6" fill="#46c08e" stroke="#fff" stroke-width="1.5"/>
  <circle cx="160" cy="364" r="6" fill="#46c08e" stroke="#fff" stroke-width="1.5"/>
  <circle cx="225" cy="364" r="6" fill="#46c08e" stroke="#fff" stroke-width="1.5"/>
  <circle cx="290" cy="364" r="6" fill="#46c08e" stroke="#fff" stroke-width="1.5"/>
  <circle cx="650" cy="364" r="7" fill="#e08a84" stroke="#fff" stroke-width="1.5"/>
  <text class="sub" x="60"  y="386" font-size="11" fill="#9aa8bc">time &#8594;</text>
  <text class="sub" x="650" y="388" text-anchor="middle" font-size="11" fill="#b8423b">cold turn</text>

  <!-- callout -->
  <text class="sub" x="42" y="426" font-size="13" fill="#3a7480"><tspan font-weight="700">Cache Manager's live countdown mirrors that window</tspan> &#8212; so you can see it lapsing instead of silently</text>
  <text class="sub" x="42" y="445" font-size="13" fill="#3a7480">idling past the TTL and paying for a cold start on your next message.</text>

  <!-- ============ BAND 3: cost + role ============ -->
  <line x1="42" y1="468" x2="838" y2="468" stroke="#eceff3" stroke-width="2"/>
  <text class="hd" x="42" y="498" font-size="15.5" fill="#8a6410">3 &#183; The bill &#8212; and where Cache Manager helps</text>

  <!-- bars -->
  <rect x="92"  y="645" width="60" height="15"  rx="4" fill="#d9f5e8" stroke="#46c08e" stroke-width="2"/>
  <rect x="232" y="510" width="60" height="150" rx="4" fill="#fde3e1" stroke="#e8a39c" stroke-width="2"/>
  <line x1="80" y1="660" x2="320" y2="660" stroke="#cdd6e2" stroke-width="2"/>

  <text class="sub" x="122" y="680" text-anchor="middle" font-size="12" font-weight="700" fill="#2f6b54">warm hit</text>
  <text class="tool" x="122" y="695" text-anchor="middle" font-size="11" fill="#4f8a72">$0.50/1M</text>
  <text class="sub" x="262" y="680" text-anchor="middle" font-size="12" font-weight="700" fill="#b8423b">cold miss</text>
  <text class="tool" x="262" y="695" text-anchor="middle" font-size="11" fill="#b15a54">$5.00/1M</text>

  <text class="hd"  x="379" y="554" text-anchor="middle" font-size="22" fill="#c0453f">= 10&#215;</text>
  <text class="sub" x="379" y="575" text-anchor="middle" font-size="13" fill="#c0453f">per turn</text>
  <text class="sub" x="379" y="606" text-anchor="middle" font-size="13" fill="#8a6410">&#8776; 3.5&#215; per session</text>
  <text class="sub" x="379" y="623" text-anchor="middle" font-size="11.5" fill="#9aa093">at 90% cache miss</text>

  <!-- role box -->
  <g filter="url(#ds)">
    <rect x="466" y="514" width="372" height="186" rx="16" fill="#eef9f3" stroke="#9ad9bd" stroke-width="2"/>
  </g>
  <text class="hd" x="488" y="542" font-size="14.5" fill="#0f7a57">What Cache Manager actually does</text>

  <text class="sub" x="488" y="566" font-size="12.5" fill="#3c6b59"><tspan font-weight="700">&#8226; See the window.</tspan> Live TTL countdown plus per-session</text>
  <text class="sub" x="500" y="583" font-size="12.5" fill="#3c6b59">cost &amp; cache-savings &#8212; no guessing.</text>

  <text class="sub" x="488" y="608" font-size="12.5" fill="#3c6b59"><tspan font-weight="700">&#8226; Resume cheaply.</tspan> Cache gone (idle-out or a brand-</text>
  <text class="sub" x="500" y="625" font-size="12.5" fill="#3c6b59">new chat)? <tspan class="tool" font-size="12" fill="#0f7a57">resume_or_start</tspan> reads back one</text>
  <text class="sub" x="500" y="642" font-size="12.5" fill="#3c6b59">compact memory instead of re-deriving the project.</text>

  <text class="sub" x="488" y="667" font-size="12.5" fill="#3c6b59"><tspan font-weight="700">&#8226; Stay honest.</tspan> Reports its own overhead too &#8212;</text>
  <text class="sub" x="500" y="684" font-size="12.5" fill="#3c6b59">schema-tax + per-call token cost.</text>

  <!-- footnote -->
  <line x1="42" y1="710" x2="838" y2="710" stroke="#f0f2f5" stroke-width="2"/>
  <text class="sub" x="42" y="730" font-size="10.5" fill="#aab2bd">Rates: claude-opus-4-8 list prices (cache-read $0.50 &#183; input $5 &#183; cache-write $6.25 per 1M). Caching saves the tokens; Cache Manager helps you capture them.</text>
</svg>
