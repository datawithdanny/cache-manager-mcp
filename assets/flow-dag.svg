<svg xmlns="http://www.w3.org/2000/svg" width="840" height="800" viewBox="0 0 840 800" role="img" aria-label="Cache Manager MCP tool-call flow in an agent chat">
  <defs>
    <style>
      .lab   { font-family: 'Chalkboard SE','Comic Neue','Trebuchet MS','Segoe UI',sans-serif; }
      .tool  { font-family: 'SFMono-Regular','Consolas','Liberation Mono',monospace; font-weight: 700; }
      .sub   { font-family: 'Trebuchet MS','Segoe UI',sans-serif; }
      .edge  { font-family: 'Trebuchet MS','Segoe UI',sans-serif; font-weight: 600; }
      .hd    { font-family: 'Chalkboard SE','Comic Neue','Trebuchet MS','Segoe UI',sans-serif; font-weight: 700; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end">
      <path d="M0 0 L10 5 L0 10 z" fill="#6b7a90"/>
    </marker>
    <marker id="arrowT" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end">
      <path d="M0 0 L10 5 L0 10 z" fill="#4bb6c4"/>
    </marker>
    <marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end">
      <path d="M0 0 L10 5 L0 10 z" fill="#0f7a57"/>
    </marker>
    <filter id="ds" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1e2a3a" flood-opacity="0.16"/>
    </filter>
  </defs>

  <!-- card -->
  <rect x="2" y="2" width="836" height="796" rx="22" fill="#ffffff" stroke="#dfe6ef" stroke-width="2"/>

  <!-- ================= CONTAINER: every turn (drawn under nodes/edges) ================= -->
  <rect x="96" y="244" width="508" height="344" rx="18" fill="#f6fbfd" stroke="#bfe6ec" stroke-width="2" stroke-dasharray="2 4"/>
  <text class="hd" x="116" y="270" font-size="15" fill="#0c6470">&#8635; EVERY REQUEST &#8212; heartbeat bracket</text>

  <!-- ================= EDGES ================= -->
  <!-- start -> resume -->
  <path d="M350 96 L350 130" stroke="#6b7a90" stroke-width="2.4" fill="none" marker-end="url(#arrow)"/>
  <!-- resume -> heartbeat -->
  <path d="M350 216 L350 286" stroke="#6b7a90" stroke-width="2.4" fill="none" marker-end="url(#arrow)"/>
  <!-- heartbeat start -> heartbeat end (the turn's work happens here) -->
  <path d="M350 350 L350 390" stroke="#6b7a90" stroke-width="2.4" fill="none" marker-end="url(#arrow)"/>
  <text class="edge" x="362" y="367" font-size="12.5" fill="#6b7a90">do the work &#183; optional progress pings</text>
  <text class="sub" x="362" y="384" font-size="11" fill="#7a8aa0">check status / countdown anytime (optional)</text>
  <!-- status -> decision -->
  <path d="M350 454 L350 474" stroke="#6b7a90" stroke-width="2.4" fill="none" marker-end="url(#arrow)"/>
  <!-- decision NO loop back up to heartbeat (routed outside container, left) -->
  <path d="M218 524 L58 524 L58 319 L192 319" stroke="#4bb6c4" stroke-width="2.4" fill="none" marker-end="url(#arrowT)"/>
  <text class="edge" x="44" y="421" text-anchor="middle" font-size="14" fill="#0c6470" transform="rotate(-90 44 421)">No &#8212; keep working</text>
  <!-- decision YES down to handoff -->
  <path d="M350 572 L350 634" stroke="#6b7a90" stroke-width="2.4" fill="none" marker-end="url(#arrow)"/>
  <text class="edge" x="362" y="612" font-size="14" fill="#8a6410">Yes &#8212; good cut point</text>
  <!-- handoff -> checkpoint -->
  <path d="M350 698 L350 722" stroke="#6b7a90" stroke-width="2.4" fill="none" marker-end="url(#arrow)"/>
  <!-- checkpoint loopback to resume (fresh chat), routed outside container, right -->
  <path d="M520 756 L770 756 L770 174 L524 174" stroke="#0f7a57" stroke-width="2.4" fill="none" stroke-dasharray="7 5" marker-end="url(#arrowG)"/>
  <text class="edge" x="786" y="465" text-anchor="middle" font-size="14" fill="#0f7a57" transform="rotate(90 786 465)">fresh chat &#8594; resume with restart_prompt</text>

  <!-- ================= NODES ================= -->
  <!-- START -->
  <g filter="url(#ds)">
    <rect x="210" y="40" width="280" height="56" rx="16" fill="#eef2f7" stroke="#b8c4d6" stroke-width="2"/>
  </g>
  <text class="lab" x="350" y="74" text-anchor="middle" font-size="20" fill="#33415c">&#128172;  Agent chat begins</text>

  <!-- resume_or_start -->
  <g filter="url(#ds)">
    <rect x="180" y="132" width="340" height="84" rx="16" fill="#d9f5e8" stroke="#46c08e" stroke-width="2"/>
  </g>
  <text class="tool" x="350" y="166" text-anchor="middle" font-size="19" fill="#0f7a57">resume_or_start</text>
  <text class="sub" x="350" y="190" text-anchor="middle" font-size="13.5" fill="#3c6b59">restore latest memory &#183; start 5-min TTL</text>
  <text class="sub" x="350" y="207" text-anchor="middle" font-size="12.5" fill="#6a8f80">read it back as context &#8212; no re-explaining</text>

  <!-- heartbeat -->
  <g filter="url(#ds)">
    <rect x="196" y="288" width="308" height="62" rx="16" fill="#d3f0f4" stroke="#4bb6c4" stroke-width="2"/>
  </g>
  <text class="tool" x="350" y="314" text-anchor="middle" font-size="16" fill="#0c6470">heartbeat &#183; phase:'start'</text>
  <text class="sub" x="350" y="335" text-anchor="middle" font-size="12.5" fill="#3a7480">before any work &#183; marks the chat 'running'</text>

  <!-- status / countdown -->
  <g filter="url(#ds)">
    <rect x="196" y="392" width="308" height="62" rx="16" fill="#d3f0f4" stroke="#4bb6c4" stroke-width="2"/>
  </g>
  <text class="tool" x="350" y="418" text-anchor="middle" font-size="16" fill="#0c6470">heartbeat &#183; phase:'end'</text>
  <text class="sub" x="350" y="439" text-anchor="middle" font-size="12.5" fill="#3a7480">right before the reply &#183; resumes the countdown</text>

  <!-- decision diamond -->
  <g filter="url(#ds)">
    <polygon points="350,476 482,524 350,572 218,524" fill="#fff4d6" stroke="#e8b94a" stroke-width="2"/>
  </g>
  <text class="lab" x="350" y="519" text-anchor="middle" font-size="14" fill="#6b5414">finished a substantial</text>
  <text class="lab" x="350" y="537" text-anchor="middle" font-size="14" fill="#6b5414">work item?</text>

  <!-- handoff_prompt -->
  <g filter="url(#ds)">
    <rect x="200" y="636" width="300" height="62" rx="16" fill="#fdeecb" stroke="#e8b94a" stroke-width="2"/>
  </g>
  <text class="tool" x="350" y="666" text-anchor="middle" font-size="17" fill="#8a6410">handoff_prompt</text>
  <text class="sub" x="350" y="686" text-anchor="middle" font-size="12.5" fill="#977323">get summarization guidance</text>

  <!-- checkpoint -->
  <g filter="url(#ds)">
    <rect x="180" y="724" width="340" height="64" rx="16" fill="#d9f5e8" stroke="#46c08e" stroke-width="2"/>
  </g>
  <text class="tool" x="350" y="753" text-anchor="middle" font-size="18" fill="#0f7a57">checkpoint</text>
  <text class="sub" x="350" y="774" text-anchor="middle" font-size="12.5" fill="#3c6b59">save compact memory + emit restart_prompt &#128176;</text>
</svg>
